name: Update Weather
on:
  workflow_dispatch:
  schedule:
  - cron: '*/30 * * * *'

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@latest
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run update script to refresh new weather informations available
        run: python weather.py

      - name: Commit and Push changes
        uses: EndBug/add-and-commit@latest
        with:
          author_name: TheKingTermux
          author_email: 50316075+TheKingTermux@users.noreply.github.com
          message: "Otomatis: Update cuaca terbaru"
          add: 'README.md status.json' 
