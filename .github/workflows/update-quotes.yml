name: Update Quotes
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  update-quotes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@latest

      - name: Set up Python
        uses: actions/setup-python@latest
        with:
          python-version: '3.x'

      - name: Run update script to select next random quotes available
        run: python quotes.py

      - name: Commit and Push changes
        uses: EndBug/add-and-commit@latest
        with:
          author_name: TheKingTermux
          author_email: 50316075+TheKingTermux@users.noreply.github.com
          message: "Otomatis: Update quotes acak"
          add: 'README.md status.json'
